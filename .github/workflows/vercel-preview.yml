# Deploy every PR (and non-master pushes) to a **Vercel preview** URL.
# Production remains: push to master → vercel-prod.yml
#
# Requires repo secrets: VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_ORG_ID (or VERCEL_TEAM_ID).
name: Deploy preview to Vercel

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches-ignore:
      - master
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    # Skip fork PRs (secrets unavailable) and dependabot noise
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && !contains(github.ref, 'dependabot'))
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings (preview)
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (preview)
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt (preview)
        id: deploy
        run: |
          set -euo pipefail
          vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}" --format json > deploy-out.json
          # Vercel JSON shape varies by CLI version — scrape any *.vercel.app URL from output
          url="$(grep -oE 'https://[a-zA-Z0-9./_-]+\.vercel\.app' deploy-out.json | head -n1 || true)"
          if [ -z "$url" ]; then
            echo "::error::Could not parse preview URL from Vercel output"
            cat deploy-out.json
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview: $url"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'.trim();
            if (!url.startsWith('http')) {
              core.setFailed('Missing preview URL');
              return;
            }
            const body = [
              '### Vercel preview',
              '',
              `**${url}**`,
              '',
              '_Updated automatically from the latest commit on this PR._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- vercel-preview-bot -->';
            const bot = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            const fullBody = marker + '\n' + body;
            if (bot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: bot.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
