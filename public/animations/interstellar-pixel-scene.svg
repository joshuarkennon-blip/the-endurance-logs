  <circle cx="92" cy="76" r="8" fill="#06090d"/>
  <circle cx="92" cy="76" r="30" fill="none" stroke="#6ab4dc" stroke-opacity=".3" stroke-width="2"/>

  <!-- endurance-inspired station silhouette -->
  <g fill="#88a9ba">
    <rect x="154" y="74" width="4" height="4"/>
    <rect x="160" y="70" width="4" height="4"/>
    <rect x="166" y="74" width="4" height="4"/>
    <rect x="160" y="78" width="4" height="4"/>
    <rect x="148" y="84" width="4" height="4"/>
