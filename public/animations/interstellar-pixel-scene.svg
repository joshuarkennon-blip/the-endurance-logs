    <rect x="38" y="26" width="2" height="2"/>
    <rect x="72" y="14" width="2" height="2"/>
    <rect x="106" y="30" width="2" height="2"/>
    <rect x="138" y="18" width="2" height="2"/>
    <rect x="170" y="26" width="2" height="2"/>
    <rect x="208" y="14" width="2" height="2"/>
    <rect x="236" y="28" width="2" height="2"/>
    <rect x="270" y="16" width="2" height="2"/>
    <rect x="302" y="24" width="2" height="2"/>
    <rect x="24" y="58" width="2" height="2"/>
    <rect x="60" y="72" width="2" height="2"/>
    <rect x="118" y="62" width="2" height="2"/>
